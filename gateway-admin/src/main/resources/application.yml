server:
  port: 8080

spring:
  application:
    name: gateway-admin
  profiles:
    active: dev
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/gateway_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update  # Auto-create tables if not exist
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP
    consul:
      host: 127.0.0.1
      port: 8500
      discovery:
        enabled: false  # Disable service discovery for admin console
      config:
        enabled: false  # Disable Consul config center, using local YAML instead
        import-check:
          enabled: false

gateway:
  center:
    type: nacos  # default config center type, can be 'nacos' or 'consul'
  admin:
    jwt:
      secret: ${GATEWAY_ADMIN_JWT_SECRET:mySecretKeyForJWTTokenGenerationWhichMustBeLongEnoughAndSecure}
      expiration: 86400000  # 24 hours in milliseconds
  consul:
    host: 127.0.0.1
    port: 8500
    prefix: config
  nacos:
    data-ids:
      routes: gateway-routes.json
      services: gateway-services.json
      plugins: gateway-plugins.json
      group: DEFAULT_GROUP

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.alibaba.nacos: INFO
    com.example.gatewayadmin: DEBUG
