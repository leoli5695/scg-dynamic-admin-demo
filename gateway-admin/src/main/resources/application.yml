server:
  port: 8080

spring:
  application:
    name: gateway-admin
  profiles:
    active: dev
  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: json
        import-check:
          enabled: false
        extension-configs:
          - data-id: gateway-routes.json
            group: DEFAULT_GROUP
            refresh: true
          - data-id: gateway-services.json
            group: DEFAULT_GROUP
            refresh: true
          - data-id: gateway-plugins.json
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP

gateway:
  admin:
    nacos:
      data-ids:
        routes: gateway-routes.json
        services: gateway-services.json
        plugins: gateway-plugins.json
      group: DEFAULT_GROUP

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.alibaba.nacos: INFO
    com.example.gatewayadmin: DEBUG
